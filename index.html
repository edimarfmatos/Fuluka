<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Fuluka</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Tela de Autenticação (Senha) */
        #tela-login {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-box {
            background: #161b22;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #30363d;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .login-box input {
            width: 80%;
            padding: 10px;
            margin: 15px 0;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #fff;
            border-radius: 5px;
            text-align: center;
        }

        .login-box button {
            padding: 10px 20px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Aplicativo Secreto */
        #conteudo-app {
            display: none;
            text-align: center;
            flex-direction: column;
            align-items: center;
        }

        .avatar-container {
            width: 200px;
            height: 200px;
            position: relative;
            margin-bottom: 20px;
        }

        .rosto {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1f6feb 0%, #0d1117 70%);
            border: 2px solid #58a6ff;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.3);
        }

        .olhos {
            position: absolute;
            top: 35%;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 30px;
            box-sizing: border-box;
        }

        .olho {
            width: 20px;
            height: 20px;
            background: #58a6ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #58a6ff;
        }

        .boca {
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 10px;
            background: #58a6ff;
            border-radius: 5px;
            box-shadow: 0 0 10px #58a6ff;
            transition: all 0.1s ease;
        }

        .falando {
            animation: mexerBoca 0.2s infinite alternate;
        }

        @keyframes mexerBoca {
            0% { height: 5px; width: 50px; }
            100% { height: 40px; width: 45px; border-radius: 50%; }
        }

        /* Campo de texto para conversar com o Gemini */
        .chat-container {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .chat-container input {
            padding: 10px;
            width: 250px;
            background: #161b22;
            border: 1px solid #30363d;
            color: #fff;
            border-radius: 5px;
        }

        .chat-container button {
            padding: 10px;
            background: #1f6feb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN SEGURA -->
    <div id="tela-login">
        <div class="login-box">
            <h2>Interface Fuluka</h2>
            <p>Insira sua API Key do Gemini para iniciar:</p>
            <input type="password" id="chave-input" placeholder="AIzaSy...">
            <br>
            <button onclick="autenticar()">Entrar no Sistema</button>
        </div>
    </div>

    <!-- CONTEÚDO DO APLICATIVO -->
    <div id="conteudo-app">
        <div class="avatar-container">
            <div class="rosto">
                <div class="olhos">
                    <div class="olho"></div>
                    <div class="olho"></div>
                </div>
                <div id="boca-avatar" class="boca"></div>
            </div>
        </div>
        <h2 id="status">Fuluka Prontificado</h2>
        
        <div class="chat-container">
            <input type="text" id="user-input" placeholder="Pergunte algo para a IA...">
            <button onclick="conversarComGemini()">Enviar</button>
        </div>
    </div>

    <script>
        let CHAVE_API = "";

        function autenticar() {
            const input = document.getElementById('chave-input').value.trim();
            if (input === "") {
                alert("Por favor, insira a chave do Gemini.");
                return;
            }
            CHAVE_API = input;
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('conteudo-app').style.display = 'flex';
        }

        // COMUNICAÇÃO REAL COM O GEMINI
        async function conversarComGemini() {
            const inputField = document.getElementById('user-input');
            const textoUsuario = inputField.value.trim();
            const boca = document.getElementById('boca-avatar');
            const status = document.getElementById('status');

            if (!textoUsuario) return;

            status.innerText = "Pensando...";
            inputField.value = ""; 

            // Link oficial para comunicação com o modelo Gemini 1.5 Flash
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CHAVE_API}`;

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: textoUsuario }] }]
                    })
                });

                const data = await response.json();
                
                // Pega o texto que a IA respondeu
                const respostaIA = data.candidates[0].content.parts[0].text;
                
                console.log("Gemini respondeu:", respostaIA);
                status.innerText = respostaIA;

                // Ativa a animação do rosto falando
                boca.classList.add('falando');

                // O rosto mexe por um tempo proporcional ao tamanho da resposta
                const tempoFala = Math.min(Math.max(respostaIA.length * 50, 2000), 7000); 
                setTimeout(() => {
                    boca.classList.remove('falando');
                }, tempoFala);

            } catch (error) {
                console.error("Erro na API:", error);
                status.innerText = "Erro ao conectar com o Gemini. Verifique sua chave.";
            }
        }
    </script>
</body>
</html>
