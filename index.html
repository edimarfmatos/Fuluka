<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Fuluka</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #06090e;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Tela de Autenticação */
        #tela-login {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 9, 14, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-box {
            background: #0d1117;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #1f6feb;
            text-align: center;
            box-shadow: 0 0 30px rgba(31, 111, 235, 0.2);
        }

        .login-box input {
            width: 85%;
            padding: 12px;
            margin: 20px 0;
            background: #161b22;
            border: 1px solid #30363d;
            color: #fff;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
        }

        .login-box button {
            padding: 12px 28px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s;
        }

        .login-box button:hover {
            background: #2ea043;
        }

        /* Container Principal */
        #conteudo-app {
            display: none;
            text-align: center;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        /* Rosto Reluzente e Transcendente (Abstrato) */
        .avatar-transcendente {
            width: 250px;
            height: 250px;
            position: relative;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Orbe de luz de fundo */
        .luz-fundo {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(88, 166, 255, 0.6) 0%, rgba(139, 92, 246, 0.3) 50%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            filter: blur(25px);
            animation: pulsarLuz 4s infinite alternate ease-in-out;
        }

        /* Núcleo de energia reluzente */
        .nucleo-energia {
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, #00f2fe, #4facfe, #7f00ff);
            border-radius: 50%;
            box-shadow: 0 0 60px #00f2fe, 0 0 100px #7f00ff;
            filter: blur(2px);
            transition: all 0.3s ease;
        }

        /* Animações de estado da luz */
        @keyframes pulsarLuz {
            0% { transform: scale(0.9); opacity: 0.7; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        .falando {
            animation: vibrarFala 0.15s infinite alternate ease-in-out !important;
        }

        @keyframes vibrarFala {
            0% { transform: scale(1); filter: blur(1px); box-shadow: 0 0 50px #00f2fe, 0 0 80px #7f00ff; }
            100% { transform: scale(1.3); filter: blur(6px); box-shadow: 0 0 90px #ff007f, 0 0 150px #7f00ff; }
        }

        .escutando {
            animation: pulsoEscuta 0.6s infinite alternate ease-in-out;
        }

        @keyframes pulsoEscuta {
            0% { transform: scale(1.1); background: linear-gradient(45deg, #00ffcc, #00f2fe); box-shadow: 0 0 50px #00ffcc; }
            100% { transform: scale(0.95); background: linear-gradient(45deg, #00b3ff, #00f2fe); box-shadow: 0 0 20px #00b3ff; }
        }

        #status {
            font-size: 18px;
            color: #8b949e;
            margin-bottom: 20px;
            min-height: 54px;
            padding: 0 20px;
        }

        /* Controles de Voz e Texto */
        .controles {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #161b22;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .controles input {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            width: 300px;
        }

        /* Botões Estilizados */
        .btn-acao {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .btn-acao:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-acao svg {
            width: 24px;
            height: 24px;
            fill: #58a6ff;
        }

        .btn-mic-ativo svg {
            fill: #ea4335 !important;
        }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="login-box">
            <h2>Interface Inteligente</h2>
            <p>Insira qualquer chave válida do Gemini para conectar:</p>
            <input type="password" id="chave-input" placeholder="Insira sua chave...">
            <br>
            <button onclick="autenticar()">Liberar Sistema</button>
        </div>
    </div>

    <div id="conteudo-app">
        <div class="avatar-transcendente">
            <div class="luz-fundo"></div>
            <div id="orbe-energia" class="nucleo-energia"></div>
        </div>
        
        <div id="status">Sistema Inicializado. Aguardando comando...</div>
        
        <div class="controles">
            <button id="btn-mic" class="btn-acao" onclick="alternarMicrofone()" title="Falar por voz">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                </svg>
            </button>
            
            <input type="text" id="user-input" placeholder="Digite ou clique no microfone..." onkeypress="verificarTecla(event)">
            
            <button class="btn-acao" onclick="enviarMensagem()" title="Enviar">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        let CHAVE_API = "";
        let recognition = null;
        let estaEscutando = false;

        // Configuração do reconhecimento de voz (Microfone)
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                estaEscutando = true;
                document.getElementById('btn-mic').classList.add('btn-mic-ativo');
                document.getElementById('orbe-energia').classList.add('escutando');
                document.getElementById('status').innerText = "Ouvindo você...";
            };

            recognition.onresult = (event) => {
                const textoCapturado = event.results[0][0].transcript;
                document.getElementById('user-input').value = textoCapturado;
                enviarMensagem();
            };

            recognition.onerror = (event) => {
                console.error("Erro no microfone:", event.error);
                pararMicrofone();
            };

            recognition.onend = () => {
                pararMicrofone();
            };
        }

        function autenticar() {
            // .trim() remove espaços invisíveis colados por engano nas pontas da senha
            const input = document.getElementById('chave-input').value.trim();
            if (!input) {
                alert("Por favor, forneça uma chave.");
                return;
            }
            CHAVE_API = input; 
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('conteudo-app').style.display = 'flex';
        }

        function alternarMicrofone() {
            if (!recognition) {
                alert("Seu navegador não suporta comandos de voz.");
                return;
            }
            if (estaEscutando) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function pararMicrofone() {
            estaEscutando = false;
            document.getElementById('btn-mic').classList.remove('btn-mic-ativo');
            document.getElementById('orbe-energia').classList.remove('escutando');
            if(document.getElementById('status').innerText === "Ouvindo você...") {
                document.getElementById('status').innerText = "Aguardando comando...";
            }
        }

        function verificarTecla(e) {
            if (e.key === 'Enter') enviarMensagem();
        }

        // COMUNICAÇÃO ATUALIZADA INTERNA
        async function enviarMensagem() {
            const inputField = document.getElementById('user-input');
            const textoUsuario = inputField.value.trim();
            const orbe = document.getElementById('orbe-energia');
            const status = document.getElementById('status');

            if (!textoUsuario) return;

            status.innerText = "Processando reflexão...";
            inputField.value = "";

            // ROTA CORRIGIDA v1
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${CHAVE_API}`;

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ 
                        contents: [{ 
                            parts: [{ text: textoUsuario }] 
                        }] 
                    })
                });

                // Se o Google recusar a comunicação interna, captura o erro detalhado
                if (!response.ok) {
                    const dadosErro = await response.json();
                    console.error("Erro retornado pelo Gemini:", dadosErro);
                    status.innerText = `Falha na comunicação: ${dadosErro.error.message} (Código ${dadosErro.error.code})`;
                    return;
                }

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
                    const respostaIA = data.candidates[0].content.parts[0].text;
                    
                    status.innerText = respostaIA;
                    falarRespostaTexto(respostaIA); 
                } else {
                    status.innerText = "Recebi uma resposta em formato inesperado.";
                }

            } catch (error) {
                console.error("Erro crítico na rede:", error);
                status.innerText = "Não foi possível enviar a mensagem. Verifique a conexão do aplicativo.";
            }
        }

        function falarRespostaTexto(texto) {
            if ('speechSynthesis' in window) {
                const textoLimpo = texto.replace(/[*#_]/g, '');
                const utterance = new SpeechSynthesisUtterance(textoLimpo);
                utterance.lang = 'pt-BR';

                const orbe = document.getElementById('orbe-energia');
                
                utterance.onstart = () => {
                    orbe.classList.add('falando');
                };

                utterance.onend = () => {
                    orbe.classList.remove('falando');
                };

                window.speechSynthesis.speak(utterance);
            } else {
                const orbe = document.getElementById('orbe-energia');
                orbe.classList.add('falando');
                setTimeout(() => orbe.classList.remove('falando'), 4000);
            }
        }
    </script>
</body>
</html>
